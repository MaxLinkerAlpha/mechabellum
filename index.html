<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>钢铁指挥官 (Mechabellum) 战术复盘图生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f11;
            --panel-bg: #1a1a1d;
            --border-color: #2c2c35;
            --primary: #00bcd4;
            --red: #e53935;
            --blue: #1e88e5;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 900px;}
        .header h1 { margin-bottom: 5px; font-size: 28px; letter-spacing: 1px;}
        .header p { color: #888; font-size: 14px;}
        
        #drop-zone {
            border: 2px dashed #555;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            background-color: #151515;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px auto;
            color: #aaa;
            font-size: 16px;
        }
        #drop-zone.hover {
            background-color: #222;
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.2);
        }

        .controls { 
            margin-top: 15px; 
            display: flex; 
            gap: 15px; 
            justify-content: center;
            display: none; /* 初始隐藏，解析成功后显示 */
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #2a2a30;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        button:hover { background-color: #383842; }
        .btn-active { border-color: var(--primary); color: var(--primary); }
        .btn-primary { background-color: var(--primary); color: #000; border: none; }
        .btn-primary:hover { background-color: #009eb3; }

        /* 渲染区域 */
        #render-wrapper {
            width: 1000px;
            background-color: var(--panel-bg);
            margin-top: 20px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: none;
            border: 1px solid #252528;
        }
        
        .players-title {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: 900;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .player-name-a { color: var(--red); flex: 1; text-align: right; }
        .player-name-b { color: var(--blue); flex: 1; text-align: left; }
        .vs { padding: 0 40px; color: #555; font-style: italic; font-size: 20px; line-height: 35px;}

        /* 互动播放器特有样式 */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .round-indicator { 
            font-size: 22px; 
            font-weight: 900; 
            width: 160px; 
            text-align: center; 
            color: #fff;
            letter-spacing: 1px;
        }

        /* 回合行卡片 */
        .timeline-row {
            display: flex;
            margin-bottom: 25px;
            align-items: stretch;
            background: #161619;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #222;
        }
        .info-box {
            flex: 1;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .info-box.left { padding-right: 20px; text-align: right; border-right: 3px solid rgba(229, 57, 53, 0.3);}
        .info-box.right { padding-left: 20px; text-align: left; border-left: 3px solid rgba(30, 136, 229, 0.3);}
        
        .hp-bar { font-size: 12px; color: #888; margin-bottom: 10px; font-weight: bold;}
        .hp-val { font-weight: 900; font-size: 16px; margin-left: 5px; color: #fff;}
        .units-list { color: #ffca28; line-height: 1.8; font-weight: 600; font-size: 15px;}
        .empty-hint { color: #555; font-style: italic; font-weight: normal;}
        
        /* 迷你沙盘 */
        .map-container {
            width: 400px;
            height: 260px;
            margin: 0 30px;
            background-color: #080808;
            border: 2px solid #333;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .round-badge {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 4px 16px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 14px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>钢铁指挥官 (Mechabellum) 战术复盘工作台</h1>
        <p>毫秒级解析 .grbr / .replay 录像，支持1v1及2v2四人混战，自动生成对局阵型变化</p>
        
        <div id="drop-zone">
            📥 将游戏录像文件拖拽到此处，或点击浏览文件
        </div>
        <input type="file" id="fileInput" style="display: none" accept=".grbr,.replay">
        
        <div class="controls" id="main-controls">
            <button onclick="switchMode('player')" id="btnPlayerMode" class="btn-active">▶️ 互动播放器</button>
            <button onclick="switchMode('list')" id="btnListMode">📜 生成静态长图</button>
            <button onclick="toggleLang()" id="btnLang">🌐 切换为 English</button>
            <button class="btn-primary" onclick="downloadImage()" id="btnDownload">📸 保存当前画面为图片</button>
        </div>
    </div>

    <div id="render-wrapper">
        <div class="players-title">
            <div class="player-name-a" id="playerA">红方队伍</div>
            <div class="vs">VS</div>
            <div class="player-name-b" id="playerB">蓝方队伍</div>
        </div>

        <div class="player-controls" id="player-controls">
            <button onclick="changeRound(-1)">◀ 上一回合</button>
            <div class="round-indicator" id="current-round-text">Round 1</div>
            <button onclick="changeRound(1)">下一回合 ▶</button>
        </div>

        <div id="timeline-container"></div>
    </div>

<script>
    // 严格校对官方 Game_glossary.csv 的字典
    const glossary = {
        "1": { cn: "尖牙", en: "Fang", short: "牙" },
        "2": { cn: "爬虫", en: "Crawler", short: "爬" },
        "3": { cn: "长弓", en: "Marksman", short: "弓" },
        "4": { cn: "弧光", en: "Arclight", short: "弧" },
        "5": { cn: "野马", en: "Mustang", short: "马" },
        "6": { cn: "钢球", en: "Steel Ball", short: "球" },
        "7": { cn: "霸主", en: "Overlord", short: "霸" },
        "8": { cn: "暴雨", en: "Stormcaller", short: "雨" },
        "9": { cn: "熔点", en: "Melting Point", short: "熔" },
        "10": { cn: "铁锤", en: "Sledgehammer", short: "锤" },
        "11": { cn: "火神", en: "Vulcan", short: "火" },
        "12": { cn: "骇客", en: "Hacker", short: "骇" },
        "13": { cn: "犀牛", en: "Rhino", short: "犀" },
        "14": { cn: "凤凰", en: "Phoenix", short: "凤" },
        "15": { cn: "兵蜂", en: "Wasp", short: "蜂" },
        "16": { cn: "堡垒", en: "Fortress", short: "堡" },
        "17": { cn: "沙虫", en: "Sandworm", short: "沙" },
        "18": { cn: "狂蝎", en: "Scorpion", short: "蝎" },
        "19": { cn: "猎犬", en: "Hound", short: "犬" },
        "20": { cn: "雷霆", en: "Raiden", short: "雷" },
        "21": { cn: "鬼鳐", en: "Phantom Ray", short: "鳐" },
        "22": { cn: "狼蛛", en: "Tarantula", short: "蛛" },
        "23": { cn: "剑齿虎", en: "Sabertooth", short: "虎" },
        "24": { cn: "战争工厂", en: "War Factory", short: "厂" },
        "25": { cn: "恶灵", en: "Wraith", short: "恶" },
        "26": { cn: "台风", en: "Typhoon", short: "风" },
        "27": { cn: "火獾", en: "Fire Badger", short: "獾" },
        "28": { cn: "空兵群", en: "Wasp Swarm", short: "群" },
        "29": { cn: "魔眼", en: "Void Eye", short: "眼" },
        "30": { cn: "丧钟", en: "Death Knell", short: "钟" }
    };

    let appState = {
        lang: 'cn',
        mode: 'player', // 默认互动模式
        currentRoundIndex: 0,
        roundsData: [], 
        bounds: null
    };

    // 拦截全屏拖拽，防止页面被文件替换
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
        document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', () => dropZone.classList.add('hover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('hover');
        handleFile(e.dataTransfer.files[0]);
    });
    dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', (e) => handleFile(e.target.files[0]));

    function toggleLang() {
        appState.lang = appState.lang === 'cn' ? 'en' : 'cn';
        document.getElementById('btnLang').innerText = appState.lang === 'cn' ? '🌐 切换为 English' : '🌐 Switch to 中文';
        renderUI();
    }

    function switchMode(newMode) {
        appState.mode = newMode;
        if(newMode === 'list') {
            document.getElementById('btnListMode').classList.add('btn-active');
            document.getElementById('btnPlayerMode').classList.remove('btn-active');
            document.getElementById('player-controls').style.display = 'none';
        } else {
            document.getElementById('btnPlayerMode').classList.add('btn-active');
            document.getElementById('btnListMode').classList.remove('btn-active');
            document.getElementById('player-controls').style.display = 'flex';
        }
        renderUI();
    }

    function changeRound(delta) {
        let newIdx = appState.currentRoundIndex + delta;
        if (newIdx >= 0 && newIdx < appState.roundsData.length) {
            appState.currentRoundIndex = newIdx;
            renderUI();
        }
    }

    // ★ 关键修复：安全的毫秒级解码方案
    function handleFile(file) {
        if (!file) return;
        dropZone.innerText = "⏳ 正在极速解析中...";
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const buffer = e.target.result;
            // 采用致命错误忽略的强力解码，剔除引擎二进制前缀
            const text = new TextDecoder("utf-8", { fatal: false }).decode(buffer);
            
            const startIdx = text.indexOf('<?xml');
            const endIdx = text.lastIndexOf('</BattleRecord>');
            
            if (startIdx === -1 || endIdx === -1) {
                dropZone.innerText = "❌ 解析失败：未检测到有效录像数据";
                return;
            }

            const cleanXmlStr = text.substring(startIdx, endIdx + 15);
            extractData(cleanXmlStr);
            
            dropZone.innerText = "✅ 解析成功！可随时拖入新录像";
            document.getElementById('main-controls').style.display = 'flex';
            switchMode('player');
        };
        // 读取为 ArrayBuffer 避免任何编码截断
        reader.readAsArrayBuffer(file);
    }

    // ★ 关键重构：支持2v2多玩家阵营合并
    function extractData(xmlStr) {
        const xml = new DOMParser().parseFromString(xmlStr, "text/xml");
        const playerRecords = Array.from(xml.querySelectorAll("PlayerRecord"));
        
        // 按照 team 属性分组
        let teams = { "0": [], "1": [] };
        playerRecords.forEach(p => {
            const t = p.querySelector("data > team")?.textContent;
            if(teams[t]) teams[t].push(p);
        });

        // 拼接玩家名字
        const getName = (tList) => tList.map(p => p.querySelector("name").textContent).join(" & ");
        document.getElementById('playerA').innerText = (teams["0"].length ? getName(teams["0"]) : "红方") + " (红)";
        document.getElementById('playerB').innerText = (teams["1"].length ? getName(teams["1"]) : "蓝方") + " (蓝)";

        // 计算沙盘自适应边界
        let bounds = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
        xml.querySelectorAll("NewUnitData > Position").forEach(pos => {
            const x = parseFloat(pos.querySelector("x")?.textContent || 0);
            const y = parseFloat(pos.querySelector("y")?.textContent || 0);
            if(x < bounds.minX) bounds.minX = x;
            if(x > bounds.maxX) bounds.maxX = x;
            if(y < bounds.minY) bounds.minY = y;
            if(y > bounds.maxY) bounds.maxY = y;
        });
        bounds.minX -= 60; bounds.maxX += 60; bounds.minY -= 60; bounds.maxY += 60;
        appState.bounds = bounds;
        appState.roundsData = [];

        // 获取回合总数 (以第一个队伍第一个人为准)
        if(!teams["0"].length) return;
        const maxRounds = teams["0"][0].querySelectorAll("PlayerRoundRecord").length;
        
        let historyA = {}, historyB = {};

        // 跳过 R0，从 R1 开始
        for (let r = 1; r < maxRounds; r++) {
            
            // 聚合该队伍所有玩家在本回合的单位
            let currUnitsA = [], currUnitsB = [];
            let hpA = "0", hpB = "0";

            teams["0"].forEach((p, idx) => {
                const roundNode = p.querySelectorAll("PlayerRoundRecord")[r];
                if(roundNode) {
                    if(idx === 0) hpA = roundNode.querySelector("reactorCore")?.textContent || "0";
                    currUnitsA = currUnitsA.concat(getUnitsDetail(roundNode));
                }
            });

            teams["1"].forEach((p, idx) => {
                const roundNode = p.querySelectorAll("PlayerRoundRecord")[r];
                if(roundNode) {
                    if(idx === 0) hpB = roundNode.querySelector("reactorCore")?.textContent || "0";
                    currUnitsB = currUnitsB.concat(getUnitsDetail(roundNode));
                }
            });

            const countsA = countUnits(currUnitsA);
            const countsB = countUnits(currUnitsB);
            
            const rData = {
                round: r,
                hpA: hpA, hpB: hpB,
                unitsA: currUnitsA, unitsB: currUnitsB,
                diffA: calculateDiff(historyA, countsA),
                diffB: calculateDiff(historyB, countsB)
            };
            
            historyA = countsA; historyB = countsB;
            appState.roundsData.push(rData);
        }
    }

    function getUnitsDetail(node) {
        let res = [];
        node.querySelectorAll("units > NewUnitData").forEach(u => {
            res.push({
                id: u.querySelector("id")?.textContent,
                x: parseFloat(u.querySelector("Position > x")?.textContent || 0),
                y: parseFloat(u.querySelector("Position > y")?.textContent || 0),
                rot: u.querySelector("IsRotate")?.textContent === 'true'
            });
        });
        return res;
    }

    function countUnits(list) {
        let c = {};
        list.forEach(u => c[u.id] = (c[u.id] || 0) + 1);
        return c;
    }

    function calculateDiff(oldObj, newObj) {
        let diff = {};
        for (let id in newObj) {
            let added = newObj[id] - (oldObj[id] || 0);
            if (added > 0) diff[id] = added;
        }
        return diff;
    }

    function renderUI() {
        const container = document.getElementById('timeline-container');
        let html = "";
        let mapsToDraw = [];
        const hpLabel = appState.lang === 'cn' ? "主堡生命值 :" : "Core HP :";

        const renderSingleRow = (data) => {
            const cid = `cvs-r${data.round}`;
            const htmlBlock = `
                <div class="timeline-row">
                    <div class="info-box left">
                        <div class="hp-bar">${hpLabel} <span class="hp-val">${data.hpA}</span></div>
                        <div class="units-list">${formatDiff(data.diffA, data.round === 1)}</div>
                    </div>
                    <div class="map-container">
                        <div class="round-badge">Round ${data.round}</div>
                        <canvas id="${cid}" width="400" height="260"></canvas>
                    </div>
                    <div class="info-box right">
                        <div class="hp-bar">${hpLabel} <span class="hp-val">${data.hpB}</span></div>
                        <div class="units-list">${formatDiff(data.diffB, data.round === 1)}</div>
                    </div>
                </div>
            `;
            mapsToDraw.push({ id: cid, d: data });
            return htmlBlock;
        };

        if (appState.mode === 'list') {
            appState.roundsData.forEach(d => html += renderSingleRow(d));
        } else {
            const currData = appState.roundsData[appState.currentRoundIndex];
            if(currData) {
                document.getElementById('current-round-text').innerText = `Round ${currData.round}`;
                html += renderSingleRow(currData);
            }
        }

        container.innerHTML = html;
        document.getElementById('render-wrapper').style.display = 'block';

        setTimeout(() => {
            mapsToDraw.forEach(m => drawMap(m.id, m.d.unitsA, m.d.unitsB));
        }, 50);
    }

    function formatDiff(diff, isInit) {
        let items = [];
        for (let id in diff) {
            let info = glossary[id];
            let name = info ? info[appState.lang] : `Unknown[${id}]`;
            items.push(`${isInit ? "" : "➕ "}${diff[id]} x ${name}`);
        }
        if (!items.length) return `<span class="empty-hint">${appState.lang==='cn'?'(未招募新单位)':'(No new recruitment)'}</span>`;
        return items.join('<br>');
    }

    // 高精度战术沙盘绘制
    function drawMap(canvasId, unitsA, unitsB) {
        const cvs = document.getElementById(canvasId);
        if (!cvs) return;
        const ctx = cvs.getContext('2d');
        const w = cvs.width, h = cvs.height;
        const b = appState.bounds;

        // 绘制深色草地背景与网格
        ctx.fillStyle = "#0c0c0e";
        ctx.fillRect(0, 0, w, h);
        
        // 绘制楚河汉界（中心线）
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
        ctx.setLineDash([]);

        const rangeX = b.maxX - b.minX || 1;
        const rangeY = b.maxY - b.minY || 1;

        function renderU(u, color) {
            const cx = ((u.x - b.minX) / rangeX) * w;
            const cy = ((u.y - b.minY) / rangeY) * h;
            
            // 实体圆点
            ctx.beginPath();
            ctx.arc(cx, cy, 9, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            // 侧翼绕后标记：外面画个白圈
            if (u.rot) {
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 绘制兵种首字母简称
            ctx.fillStyle = "#fff";
            ctx.font = "bold 10px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(glossary[u.id]?.short || "?", cx, cy + 1);
        }

        // 先画蓝方再画红方
        unitsB.forEach(u => renderU(u, "#1e88e5"));
        unitsA.forEach(u => renderU(u, "#e53935"));
    }

    function downloadImage() {
        const btn = document.getElementById('btnDownload');
        const oldText = btn.innerText;
        btn.innerText = "⌛ 图像渲染中...";
        
        html2canvas(document.getElementById('render-wrapper'), {
            backgroundColor: '#1a1a1d', 
            scale: 2 // 高清输出
        }).then(canvas => {
            const a = document.createElement('a');
            const modeName = appState.mode === 'list' ? '全局图' : `R${appState.roundsData[appState.currentRoundIndex].round}`;
            a.download = `战术复盘_${modeName}_${new Date().getTime()}.png`;
            a.href = canvas.toDataURL("image/png");
            a.click();
            btn.innerText = oldText;
        });
    }
</script>
</body>
</html>
