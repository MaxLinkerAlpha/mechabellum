<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>钢铁指挥官 (Mechabellum) 战术复盘图生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --primary: #00bcd4;
            --red: #ff5252;
            --blue: #448aff;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 900px;}
        
        #drop-zone {
            border: 2px dashed var(--primary);
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            background-color: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 auto;
        }
        #drop-zone.hover {
            background-color: #252525;
            border-color: #4caf50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
        }

        .controls { 
            margin-top: 20px; 
            display: flex; 
            gap: 15px; 
            justify-content: center;
            display: none; /* 初始隐藏，解析后显示 */
        }
        
        button {
            padding: 10px 25px;
            font-size: 15px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background-color: #444; }
        .btn-primary { background-color: var(--primary); color: #000; border: none; }
        .btn-primary:hover { background-color: #008ba3; }

        /* 渲染区域 */
        #render-wrapper {
            width: 1000px;
            background-color: #181818;
            margin-top: 30px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }
        
        .players-title {
            display: flex;
            justify-content: space-between;
            font-size: 26px;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .player-name-a { color: var(--red); flex: 1; text-align: right; }
        .player-name-b { color: var(--blue); flex: 1; text-align: left; }
        .vs { padding: 0 30px; color: #666; font-style: italic; }

        /* 互动播放器特有样式 */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 8px;
        }
        .round-indicator { font-size: 20px; font-weight: bold; width: 150px; text-align: center; color: var(--primary);}

        /* 回合行卡片 */
        .timeline-row {
            display: flex;
            margin-bottom: 25px;
            align-items: center;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
        }
        .info-box {
            flex: 1;
            padding: 15px;
            font-size: 14px;
            min-height: 120px;
        }
        .info-box.left { border-right: 3px solid var(--red); text-align: right; }
        .info-box.right { border-left: 3px solid var(--blue); text-align: left; }
        
        .hp-bar { font-size: 14px; color: #aaa; margin-bottom: 12px; }
        .hp-val { font-weight: bold; font-size: 16px; margin-left: 5px; color: #fff;}
        .units-list { color: #ffd54f; line-height: 1.8; font-weight: 500;}
        .empty-hint { color: #666; font-style: italic; }
        
        /* 迷你沙盘 */
        .map-container {
            width: 360px;
            height: 240px;
            margin: 0 20px;
            background-color: #0a0a0a;
            border: 2px solid #444;
            border-radius: 6px;
            position: relative;
        }
        .round-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #eee;
            color: #000;
            padding: 3px 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛠️ Mechabellum 战术复盘图生成器</h1>
        <div id="drop-zone">
            📥 拖拽 .grbr / .replay 录像文件到此处，或点击上传
        </div>
        <input type="file" id="fileInput" style="display: none" accept=".grbr,.replay">
        
        <div class="controls" id="main-controls">
            <button onclick="switchMode('list')" id="btnListMode">📜 生成静态长图</button>
            <button onclick="switchMode('player')" id="btnPlayerMode">▶️ 互动复盘棋盘</button>
            <button onclick="toggleLang()" id="btnLang">🌐 English</button>
            <button class="btn-primary" onclick="downloadImage()" id="btnDownload">⬇️ 保存为图片分享</button>
        </div>
    </div>

    <div id="render-wrapper">
        <div class="players-title">
            <div class="player-name-a" id="playerA">玩家 A (红方)</div>
            <div class="vs">VS</div>
            <div class="player-name-b" id="playerB">玩家 B (蓝方)</div>
        </div>

        <div class="player-controls" id="player-controls" style="display: none;">
            <button onclick="changeRound(-1)">◀ 上一回合</button>
            <div class="round-indicator" id="current-round-text">Round 1</div>
            <button onclick="changeRound(1)">下一回合 ▶</button>
        </div>

        <div id="timeline-container"></div>
    </div>

<script>
    // 严格按照术语表映射
    const glossary = {
        "1": { cn: "尖牙", en: "Fang", short: "牙" },
        "2": { cn: "爬虫", en: "Crawler", short: "爬" },
        "3": { cn: "长弓", en: "Marksman", short: "弓" },
        "4": { cn: "弧光", en: "Arclight", short: "弧" },
        "5": { cn: "野马", en: "Mustang", short: "马" },
        "6": { cn: "钢球", en: "Steel Ball", short: "球" },
        "7": { cn: "霸主", en: "Overlord", short: "霸" },
        "8": { cn: "暴雨", en: "Stormcaller", short: "雨" },
        "9": { cn: "熔点", en: "Melting Point", short: "熔" },
        "10": { cn: "铁锤", en: "Sledgehammer", short: "锤" },
        "11": { cn: "火神", en: "Vulcan", short: "火" },
        "12": { cn: "骇客", en: "Hacker", short: "骇" },
        "13": { cn: "犀牛", en: "Rhino", short: "犀" },
        "14": { cn: "凤凰", en: "Phoenix", short: "凤" },
        "15": { cn: "兵蜂", en: "Wasp", short: "蜂" },
        "16": { cn: "堡垒", en: "Fortress", short: "堡" },
        "17": { cn: "沙虫", en: "Sandworm", short: "沙" },
        "18": { cn: "狂蝎", en: "Scorpion", short: "蝎" },
        "19": { cn: "猎犬", en: "Hound", short: "犬" },
        "20": { cn: "雷霆", en: "Raiden", short: "雷" },
        "21": { cn: "鬼鳐", en: "Phantom Ray", short: "鳐" },
        "22": { cn: "狼蛛", en: "Tarantula", short: "蛛" },
        "23": { cn: "剑齿虎", en: "Sabertooth", short: "虎" },
        "24": { cn: "战争工厂", en: "War Factory", short: "厂" },
        "25": { cn: "恶灵", en: "Wraith", short: "恶" },
        "26": { cn: "台风", en: "Typhoon", short: "风" },
        "27": { cn: "火獾", en: "Fire Badger", short: "獾" },
        "28": { cn: "空兵群", en: "Wasp Swarm", short: "群" },
        "29": { cn: "魔眼", en: "Void Eye", short: "眼" },
        "30": { cn: "丧钟", en: "Death Knell", short: "钟" }
    };

    let appState = {
        lang: 'cn',
        mode: 'list', // 'list' 或 'player'
        currentRoundIndex: 0,
        roundsData: [], // 存放所有回合的解析数据
        bounds: null
    };

    // 拦截浏览器默认文件拖拽行为，防止跳转或下载
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
        document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', () => dropZone.classList.add('hover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('hover');
        handleFile(e.dataTransfer.files[0]);
    });
    dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', (e) => handleFile(e.target.files[0]));

    function toggleLang() {
        appState.lang = appState.lang === 'cn' ? 'en' : 'cn';
        document.getElementById('btnLang').innerText = appState.lang === 'cn' ? '🌐 English' : '🌐 中文';
        renderUI();
    }

    function switchMode(newMode) {
        appState.mode = newMode;
        if(newMode === 'list') {
            document.getElementById('btnListMode').style.border = '2px solid #00bcd4';
            document.getElementById('btnPlayerMode').style.border = '1px solid #555';
            document.getElementById('player-controls').style.display = 'none';
        } else {
            document.getElementById('btnListMode').style.border = '1px solid #555';
            document.getElementById('btnPlayerMode').style.border = '2px solid #00bcd4';
            document.getElementById('player-controls').style.display = 'flex';
            appState.currentRoundIndex = 0;
        }
        renderUI();
    }

    function changeRound(delta) {
        let newIdx = appState.currentRoundIndex + delta;
        if (newIdx >= 0 && newIdx < appState.roundsData.length) {
            appState.currentRoundIndex = newIdx;
            renderUI();
        }
    }

    // 容错读取 GRBR 二进制文件
    function handleFile(file) {
        if (!file) return;
        dropZone.innerText = "读取中...";
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const bytes = new Uint8Array(e.target.result);
            let start = -1;
            // 搜索 "<?xml" (60, 63, 120, 109, 108)
            for (let i = 0; i < bytes.length - 5; i++) {
                if (bytes[i]===60 && bytes[i+1]===63 && bytes[i+2]===120) { start = i; break; }
            }
            if (start === -1) return alert("无效的文件，未找到 XML 数据！");

            let xmlStr = new TextDecoder("utf-8", { fatal: false }).decode(bytes.slice(start));
            let endMatch = xmlStr.lastIndexOf("</BattleRecord>");
            if(endMatch !== -1) xmlStr = xmlStr.substring(0, endMatch + 15);

            extractData(xmlStr);
            dropZone.innerText = "解析成功！可继续拖入新录像";
            document.getElementById('main-controls').style.display = 'flex';
            switchMode('player'); // 默认进入互动棋盘模式
        };
        reader.readAsArrayBuffer(file);
    }

    // 核心数据解析：提取回合增量
    function extractData(xmlStr) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlStr, "text/xml");
        const players = xml.querySelectorAll("PlayerRecord");
        if (players.length < 2) return;

        document.getElementById('playerA').innerText = players[0].querySelector("name").textContent + " (红)";
        document.getElementById('playerB').innerText = players[1].querySelector("name").textContent + " (蓝)";

        const roundsA = players[0].querySelectorAll("PlayerRoundRecord");
        const roundsB = players[1].querySelectorAll("PlayerRoundRecord");
        
        // 计算沙盘自适应边界
        let bounds = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
        xml.querySelectorAll("NewUnitData > Position").forEach(pos => {
            const x = parseFloat(pos.querySelector("x")?.textContent || 0);
            const y = parseFloat(pos.querySelector("y")?.textContent || 0);
            if(x < bounds.minX) bounds.minX = x;
            if(x > bounds.maxX) bounds.maxX = x;
            if(y < bounds.minY) bounds.minY = y;
            if(y > bounds.maxY) bounds.maxY = y;
        });
        bounds.minX -= 50; bounds.maxX += 50; bounds.minY -= 50; bounds.maxY += 50;
        appState.bounds = bounds;
        appState.roundsData = [];

        let historyA = {}, historyB = {};

        for (let i = 0; i < roundsA.length; i++) {
            const rNum = roundsA[i].querySelector("round").textContent;
            if(rNum == "0") continue; // 忽略初始占位回合

            const rData = {
                round: rNum,
                hpA: roundsA[i].querySelector("reactorCore")?.textContent || "0",
                hpB: roundsB[i].querySelector("reactorCore")?.textContent || "0",
                unitsA: getUnitsDetail(roundsA[i]),
                unitsB: getUnitsDetail(roundsB[i]),
                diffA: {}, diffB: {}
            };

            const countsA = countUnits(rData.unitsA);
            const countsB = countUnits(rData.unitsB);
            
            // 计算兵种差值（即本回合新建了什么）
            rData.diffA = calculateDiff(historyA, countsA);
            rData.diffB = calculateDiff(historyB, countsB);
            
            historyA = countsA; historyB = countsB;
            appState.roundsData.push(rData);
        }
    }

    function getUnitsDetail(node) {
        let res = [];
        node.querySelectorAll("NewUnitData").forEach(u => {
            res.push({
                id: u.querySelector("id")?.textContent,
                x: parseFloat(u.querySelector("Position > x")?.textContent || 0),
                y: parseFloat(u.querySelector("Position > y")?.textContent || 0),
                rot: u.querySelector("IsRotate")?.textContent === 'true'
            });
        });
        return res;
    }

    function countUnits(list) {
        let c = {};
        list.forEach(u => c[u.id] = (c[u.id] || 0) + 1);
        return c;
    }

    function calculateDiff(oldObj, newObj) {
        let diff = {};
        for (let id in newObj) {
            let added = newObj[id] - (oldObj[id] || 0);
            if (added > 0) diff[id] = added;
        }
        return diff;
    }

    // 核心渲染逻辑 (同时支持单图和长图模式)
    function renderUI() {
        const container = document.getElementById('timeline-container');
        let html = "";
        let mapsToDraw = [];

        const hpLabel = appState.lang === 'cn' ? "主堡HP" : "Core HP";

        const renderSingleRow = (data) => {
            const cid = `cvs-r${data.round}`;
            const rowHtml = `
                <div class="timeline-row">
                    <div class="info-box left">
                        <div class="hp-bar">${hpLabel}: <span class="hp-val">${data.hpA}</span></div>
                        <div class="units-list">${formatDiff(data.diffA)}</div>
                    </div>
                    <div class="map-container">
                        <div class="round-badge">R${data.round}</div>
                        <canvas id="${cid}" width="360" height="240"></canvas>
                    </div>
                    <div class="info-box right">
                        <div class="hp-bar">${hpLabel}: <span class="hp-val">${data.hpB}</span></div>
                        <div class="units-list">${formatDiff(data.diffB)}</div>
                    </div>
                </div>
            `;
            mapsToDraw.push({ id: cid, d: data });
            return rowHtml;
        };

        if (appState.mode === 'list') {
            appState.roundsData.forEach(d => html += renderSingleRow(d));
        } else {
            const currData = appState.roundsData[appState.currentRoundIndex];
            document.getElementById('current-round-text').innerText = `Round ${currData.round}`;
            html += renderSingleRow(currData);
        }

        container.innerHTML = html;
        document.getElementById('capture-area').style.display = 'block';

        // 等DOM生成后绘制 Canvas 沙盘
        setTimeout(() => {
            mapsToDraw.forEach(m => drawMap(m.id, m.d.unitsA, m.d.unitsB));
        }, 50);
    }

    function formatDiff(diff) {
        let items = [];
        for (let id in diff) {
            let info = glossary[id];
            let name = info ? info[appState.lang] : `Unit[${id}]`;
            items.push(`+ ${diff[id]} x ${name}`);
        }
        if (!items.length) return `<span class="empty-hint">${appState.lang==='cn'?'(未招募新单位)':'(No new recruits)'}</span>`;
        return items.join('<br>');
    }

    // 战术沙盘渲染器
    function drawMap(canvasId, unitsA, unitsB) {
        const cvs = document.getElementById(canvasId);
        if (!cvs) return;
        const ctx = cvs.getContext('2d');
        const w = cvs.width, h = cvs.height;
        const b = appState.bounds;

        // 绘制深色草地背景与网格
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, w, h);
        
        // 楚河汉界
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
        ctx.setLineDash([]);

        const rangeX = b.maxX - b.minX || 1;
        const rangeY = b.maxY - b.minY || 1;

        function renderU(u, color) {
            const cx = ((u.x - b.minX) / rangeX) * w;
            const cy = ((u.y - b.minY) / rangeY) * h;
            
            ctx.beginPath();
            ctx.arc(cx, cy, 10, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            // 侧翼绕后标记
            if (u.rot) {
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // 中间写字
            ctx.fillStyle = "#fff";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(glossary[u.id]?.short || "?", cx, cy);
        }

        unitsA.forEach(u => renderU(u, "#d32f2f")); // 红方
        unitsB.forEach(u => renderU(u, "#1976d2")); // 蓝方
    }

    function downloadImage() {
        const btn = document.getElementById('btnDownload');
        const oldText = btn.innerText;
        btn.innerText = "⌛ 生成中，请稍候...";
        
        // 无论是单回合还是长图，截取整个展示区域
        html2canvas(document.getElementById('capture-area'), {
            backgroundColor: '#121212', scale: 2
        }).then(canvas => {
            const a = document.createElement('a');
            a.download = `Mechabellum_复盘战报_${new Date().getTime()}.png`;
            a.href = canvas.toDataURL("image/png");
            a.click();
            btn.innerText = oldText;
        });
    }
</script>
</body>
</html>
