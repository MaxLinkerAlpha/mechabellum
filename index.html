<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>钢铁指挥官 战术复盘工作台 v2.1.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #0c0c10; --panel: #16161d; --primary: #00e5ff; --red: #ff3d00; --blue: #2979ff;
            --text: #f0f0f0; --muted: #7a7a8c; --border: #2c2c36;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 1000px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 30px; color: #fff; letter-spacing: 1px; }
        .meta { font-size: 13px; color: var(--muted); margin-top: 8px; }
        .meta b { color: var(--primary); }

        #drop-zone {
            border: 2px dashed #555; padding: 50px; width: 650px; text-align: center; border-radius: 12px;
            background: #121217; cursor: pointer; transition: 0.3s; color: #888; font-size: 18px; margin: 15px auto;
        }
        #drop-zone * { pointer-events: none; }
        #drop-zone.hover { border-color: var(--primary); background: #1a1a24; color: var(--primary); box-shadow: 0 0 20px rgba(0,229,255,0.2); }

        .btn-group { display: none; gap: 15px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;}
        button {
            padding: 10px 20px; background: #23232c; color: #fff; border: 1px solid #444;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        button:hover { background: #333340; border-color: #666; }
        button.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 229, 255, 0.1); }
        .btn-main { background: var(--primary); color: #000; border: none; }

        #render-area {
            width: 1100px; box-sizing: border-box; background: var(--panel); padding: 30px; 
            border-radius: 12px; display: none; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        
        .teams-info { display: flex; justify-content: space-between; align-items: center; font-size: 22px; font-weight: 900; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #2a2a35; }
        .team-top { color: var(--red); flex: 1; text-align: right; }
        .team-bot { color: var(--blue); flex: 1; text-align: left; }
        .vs { flex: 0 0 100px; text-align: center; color: #555; font-style: italic; font-size: 16px;}

        .round-row { display: flex; background: #1a1a22; margin-bottom: 20px; padding: 20px; border-radius: 10px; align-items: stretch; border: 1px solid #252530;}
        .side { flex: 1; flex-basis: 0; display: flex; flex-direction: column; justify-content: flex-start; }
        .side.left { text-align: right; padding-right: 25px; border-right: 3px solid rgba(255,61,0,0.25); }
        .side.right { text-align: left; padding-left: 25px; border-left: 3px solid rgba(41,121,255,0.25); }
        
        .hp-box { font-size: 13px; color: #aaa; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px dashed #333;}
        .hp-box b { color: #fff; font-size: 18px; margin: 0 5px; }
        
        .action-list { font-size: 13px; color: #00e5ff; line-height: 1.8; margin-bottom: 10px; font-weight: bold;}
        .unit-list { color: #ffd54f; font-size: 14px; font-weight: 600; line-height: 1.8; }
        
        .map-container { flex: 0 0 350px; width: 350px; height: 350px; background: #060608; margin: 0 20px; border-radius: 8px; position: relative; border: 1px solid #222; box-shadow: inset 0 0 40px #000; }
        .r-tag { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 2px 15px; border-radius: 12px; font-weight: 900; font-size: 13px; z-index: 10;}
        canvas { display: block; width: 100%; height: 100%; border-radius: 8px;}

        .player-bar { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 25px; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <h1>钢铁指挥官 战术复盘工作台</h1>
        <div class="meta">
            版本: <b>v2.1.0 (重构坐标识别/卡牌科技展现)</b> | 架构设计: <b>Max Linker with Gemini Pro</b>
        </div>
        
        <div id="drop-zone">📥 拖拽 .grbr / .replay 录像文件到此处 (全屏拖拽亦可)</div>
        <input type="file" id="fileInput" style="display:none" accept=".grbr,.replay">

        <div class="btn-group" id="ctrls">
            <button onclick="setMode('player')" id="btnP">▶ 互动播放模式</button>
            <button onclick="setMode('list')" id="btnL">📜 静态长图模式</button>
            <button onclick="setLang('cn')" id="btnCn">中文词库</button>
            <button onclick="setLang('en')" id="btnEn">English</button>
            <button class="btn-main" onclick="exportImg()">📸 保存对局长图</button>
        </div>
    </div>

    <div id="render-area">
        <div class="teams-info">
            <div class="team-top" id="nameTop">上方 (红方)</div>
            <div class="vs" id="gameVer">Game Ver</div>
            <div class="team-bot" id="nameBot">下方 (蓝方)</div>
        </div>

        <div class="player-bar" id="pBar">
            <button onclick="nav(-1)">◀ 上一回合</button>
            <span id="curR" style="font-size:20px; font-weight:900; color:var(--primary); width:120px; text-align:center;">Round 1</span>
            <button onclick="nav(1)">下一回合 ▶</button>
        </div>

        <div id="content"></div>
    </div>

<script>
    // 官方字典与缩写
    const dict = {
        "1":{cn:"尖牙",en:"Fang",s:"牙"}, "2":{cn:"爬虫",en:"Crawler",s:"爬"}, "3":{cn:"长弓",en:"Marksman",s:"弓"},
        "4":{cn:"弧光",en:"Arclight",s:"弧"}, "5":{cn:"野马",en:"Mustang",s:"马"}, "6":{cn:"钢球",en:"Steel Ball",s:"球"},
        "7":{cn:"霸主",en:"Overlord",s:"霸"}, "8":{cn:"暴雨",en:"Stormcaller",s:"雨"}, "9":{cn:"熔点",en:"Melting Point",s:"熔"},
        "10":{cn:"铁锤",en:"Sledgehammer",s:"锤"}, "11":{cn:"火神",en:"Vulcan",s:"火"}, "12":{cn:"骇客",en:"Hacker",s:"骇"},
        "13":{cn:"犀牛",en:"Rhino",s:"犀"}, "14":{cn:"凤凰",en:"Phoenix",s:"凤"}, "15":{cn:"兵蜂",en:"Wasp",s:"蜂"},
        "16":{cn:"堡垒",en:"Fortress",s:"堡"}, "17":{cn:"沙虫",en:"Sandworm",s:"沙"}, "18":{cn:"狂蝎",en:"Scorpion",s:"蝎"},
        "19":{cn:"猎犬",en:"Hound",s:"犬"}, "20":{cn:"雷霆",en:"Raiden",s:"雷"}, "21":{cn:"幽灵",en:"Wraith",s:"幽"},
        "22":{cn:"狼蛛",en:"Tarantula",s:"蛛"}, "23":{cn:"剑齿虎",en:"Sabertooth",s:"虎"}, "24":{cn:"战争工厂",en:"War Factory",s:"厂"},
        "25":{cn:"恶灵",en:"Wraith",s:"恶"}, "26":{cn:"台风",en:"Typhoon",s:"风"}, "27":{cn:"火獾",en:"Fire Badger",s:"獾"},
        "28":{cn:"空兵群",en:"Wasp Swarm",s:"群"}, "29":{cn:"魔眼",en:"Void Eye",s:"眼"}, "30":{cn:"丧钟",en:"Death Knell",s:"钟"}
    };

    let state = { lang: 'cn', mode: 'player', cur: 0, rounds: [], bounds: null };

    // 全局防呆拖拽
    window.addEventListener("dragover", e => { e.preventDefault(); document.getElementById('drop-zone').classList.add('hover'); });
    window.addEventListener("dragleave", e => { e.preventDefault(); document.getElementById('drop-zone').classList.remove('hover'); });
    window.addEventListener("drop", e => { 
        e.preventDefault(); 
        document.getElementById('drop-zone').classList.remove('hover');
        if(e.dataTransfer.files.length) parseReplay(e.dataTransfer.files[0]); 
    });
    document.getElementById('drop-zone').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').onchange = e => { if(e.target.files.length) parseReplay(e.target.files[0]); };

    function parseReplay(file) {
        document.getElementById('drop-zone').innerText = "🚀 正在进行深度解析...";
        const reader = new FileReader();
        reader.onload = function(e) {
            const bytes = new Uint8Array(e.target.result);
            let start = -1;
            for(let i=0; i<Math.min(bytes.length, 100000); i++) {
                if(bytes[i]===60 && bytes[i+1]===63 && bytes[i+2]===120 && bytes[i+3]===109) { start = i; break; }
            }
            if(start === -1) return alert("未找到 XML 数据！");
            
            // 安全截取纯净 XML
            const rawText = new TextDecoder("utf-8", {fatal: false}).decode(bytes.slice(start));
            const cleanXml = rawText.split("</BattleRecord>")[0] + "</BattleRecord>";
            processXml(cleanXml);
        };
        reader.readAsArrayBuffer(file);
    }

    function processXml(xmlStr) {
        const xml = new DOMParser().parseFromString(xmlStr, "text/xml");
        document.getElementById('gameVer').innerText = "V." + (xml.querySelector("Version")?.textContent || "???");
        
        let validPlayers = Array.from(xml.querySelectorAll("PlayerRecord")).filter(p => {
            const type = p.querySelector("data > type")?.textContent || p.querySelector("type")?.textContent;
            return type === "Player"; // 强制剔除观战者
        });

        if(validPlayers.length < 2) return alert("录像数据异常，玩家数量不足");

        // 🌟 修复团队判别：不再信任 <team> 标签，直接按塔的 Y 坐标算上下半场
        let teams = { "top": [], "bot": [] };
        
        validPlayers.forEach(p => {
            let ySum = 0; let yCount = 0;
            // 获取初始建筑坐标 (塔)
            p.querySelectorAll("ConstructionSnapshotData > Position > y, ConstructionSnapshotData > position > y").forEach(n => {
                let v = parseFloat(n.textContent);
                if(v > -100000 && v !== 0) { ySum += v; yCount++; }
            });
            // 容错：如果没有塔，拿初始兵的坐标算
            if(yCount === 0) {
                p.querySelectorAll("NewUnitData > Position > y, NewUnitData > position > y").forEach(n => {
                    let v = parseFloat(n.textContent);
                    if(v > -100000 && v !== 0) { ySum += v; yCount++; }
                });
            }
            
            let avgY = yCount > 0 ? (ySum / yCount) : 0;
            // Y > 0 代表游戏地图的上方，Y < 0 代表下方
            if(avgY > 0) { teams["top"].push(p); } 
            else { teams["bot"].push(p); }
        });

        if(teams["top"].length === 0 || teams["bot"].length === 0) return alert("坐标系统异常，无法区分上下阵营！");

        document.getElementById('nameTop').innerText = teams["top"].map(p => p.querySelector("name").textContent).join(" & ") + " (上方)";
        document.getElementById('nameBot').innerText = teams["bot"].map(p => p.querySelector("name").textContent).join(" & ") + " (下方)";

        // 智能战场坐标缩放
        let maxAbsX = 0, maxAbsY = 0;
        xml.querySelectorAll("Position").forEach(p => {
            const x = parseFloat(p.querySelector("x").textContent), y = parseFloat(p.querySelector("y").textContent);
            if(x > -100000 && y > -100000) {
                if(Math.abs(x) > maxAbsX) maxAbsX = Math.abs(x);
                if(Math.abs(y) > maxAbsY) maxAbsY = Math.abs(y);
            }
        });
        state.bounds = { maxX: maxAbsX + 80, maxY: maxAbsY + 80 };

        state.rounds = [];
        let hTop = {}, hBot = {};
        const maxR = validPlayers[0].querySelectorAll("PlayerRoundRecord").length;

        for(let r=1; r<maxR; r++) {
            let uTop = [], uBot = [], hpTop="0", hpBot="0";
            let actTop = [], actBot = [];
            
            teams["top"].forEach((p, idx) => {
                const rd = p.querySelectorAll("PlayerRoundRecord")[r];
                if(rd) {
                    if(idx===0) hpTop = rd.querySelector("reactorCore")?.textContent || hpTop;
                    uTop = uTop.concat(getUnits(rd));
                    actTop = actTop.concat(getActions(rd));
                }
            });
            teams["bot"].forEach((p, idx) => {
                const rd = p.querySelectorAll("PlayerRoundRecord")[r];
                if(rd) {
                    if(idx===0) hpBot = rd.querySelector("reactorCore")?.textContent || hpBot;
                    uBot = uBot.concat(getUnits(rd));
                    actBot = actBot.concat(getActions(rd));
                }
            });

            const cTop = count(uTop), cBot = count(uBot);
            state.rounds.push({ 
                r, hpTop, hpBot, uTop, uBot, 
                dfTop: diff(hTop, cTop), dfBot: diff(hBot, cBot), 
                actTop, actBot 
            });
            hTop = cTop; hBot = cBot;
        }
        
        document.getElementById('ctrls').style.display = 'flex';
        document.getElementById('drop-zone').innerText = "✨ 解析成功！可在下方自由切换模式";
        state.cur = 0;
        setMode('player');
    }

    function getUnits(n) {
        return Array.from(n.querySelectorAll("units > NewUnitData")).map(u => ({
            id: u.querySelector("id").textContent,
            x: parseFloat(u.querySelector("Position > x")?.textContent || u.querySelector("x")?.textContent),
            y: parseFloat(u.querySelector("Position > y")?.textContent || u.querySelector("y")?.textContent),
            rot: u.querySelector("IsRotate")?.textContent === 'true'
        })).filter(u => u.x > -100000 && u.y > -100000); 
    }

    // 🌟 修复科技、卡牌抓取：强制文本匹配避开命名空间错误
    function getActions(roundNode) {
        let acts = [];
        let usedCard = false, usedDevice = false, usedSkill = false;

        roundNode.querySelectorAll("actionRecords > MatchActionData").forEach(act => {
            const raw = act.outerHTML || act.innerHTML || "";
            
            if(raw.includes("PAD_ChooseReinforceItem") && !usedCard) {
                acts.push({ t: 'card' }); usedCard = true;
            } else if(raw.includes("PAD_UpgradeTechnology")) {
                const uid = act.querySelector("UID")?.textContent;
                if(uid) acts.push({ t: 'tech', uid });
            } else if(raw.includes("PAD_UnlockUnit")) {
                const uid = act.querySelector("UID")?.textContent;
                if(uid) acts.push({ t: 'unlock', uid });
            } else if(raw.includes("PAD_ReleaseContraption") && !usedDevice) {
                acts.push({ t: 'device' }); usedDevice = true;
            } else if(raw.includes("PAD_ReleaseCommanderSkill") && !usedSkill) {
                acts.push({ t: 'skill' }); usedSkill = true;
            }
        });
        return acts;
    }

    function count(arr) { let r = {}; arr.forEach(i => r[i.id] = (r[i.id] || 0) + 1); return r; }
    function diff(o, n) { let r = {}; for(let k in n) if(n[k]>(o[k]||0)) r[k] = n[k]-(o[k]||0); return r; }

    function setMode(m) { 
        state.mode = m; 
        document.getElementById('btnP').className = m==='player'?'active':''; 
        document.getElementById('btnL').className = m==='list'?'active':''; 
        document.getElementById('pBar').style.display = m==='player'?'flex':'none'; 
        ui(); 
    }
    
    function setLang(l) { 
        state.lang = l; 
        document.getElementById('btnCn').className = l==='cn'?'active':''; 
        document.getElementById('btnEn').className = l==='en'?'active':''; 
        ui(); 
    }
    
    function nav(d) { state.cur = Math.max(0, Math.min(state.rounds.length-1, state.cur + d)); ui(); }

    function ui() {
        document.getElementById('render-area').style.display = 'block';
        const content = document.getElementById('content');
        content.innerHTML = "";
        
        const draw = (d) => {
            const row = document.createElement('div');
            row.className = 'round-row';
            const cid = `map-${d.r}`;
            
            // 左边显示上方队伍(敌)，右边显示下方队伍(己)
            row.innerHTML = `
                <div class="side left">
                    <div class="hp-box">剩余生命值 <b>${d.hpTop}</b></div>
                    <div class="action-list">${fmtActs(d.actTop)}</div>
                    <div class="unit-list">${fmtUnits(d.dfTop, d.r===1)}</div>
                </div>
                <div class="map-container">
                    <div class="r-tag">Round ${d.r}</div>
                    <canvas id="${cid}" width="350" height="350"></canvas>
                </div>
                <div class="side right">
                    <div class="hp-box">剩余生命值 <b>${d.hpBot}</b></div>
                    <div class="action-list">${fmtActs(d.actBot)}</div>
                    <div class="unit-list">${fmtUnits(d.dfBot, d.r===1)}</div>
                </div>
            `;
            content.appendChild(row);
            setTimeout(() => drawMap(cid, d), 10);
        };
        
        if(state.mode === 'list') { state.rounds.forEach(draw); } 
        else if(state.rounds.length > 0) {
            document.getElementById('curR').innerText = "Round " + state.rounds[state.cur].r; 
            draw(state.rounds[state.cur]); 
        }
    }

    function getUName(id) { return dict[id] ? dict[id][state.lang] : `Unit_${id}`; }

    function fmtActs(acts) {
        let res = [];
        acts.forEach(a => {
            if(a.t === 'card') res.push(state.lang === 'cn' ? '🃏 选取增援卡牌' : '🃏 Picked Card');
            else if(a.t === 'tech') res.push((state.lang === 'cn' ? '⚙️ 升级科技: ' : '⚙️ Upgrade: ') + getUName(a.uid));
            else if(a.t === 'unlock') res.push((state.lang === 'cn' ? '🔓 解锁兵种: ' : '🔓 Unlock: ') + getUName(a.uid));
            else if(a.t === 'device') res.push(state.lang === 'cn' ? '🚧 部署战术装置' : '🚧 Deploy Device');
            else if(a.t === 'skill') res.push(state.lang === 'cn' ? '🚀 释放指挥官技能' : '🚀 Cast Skill');
        });
        return res.join('<br>');
    }

    function fmtUnits(df, isFirst) {
        let res = []; 
        for(let id in df) res.push(`${isFirst?'':'➕ '}${df[id]} 队 ${getUName(id)}`);
        return res.join('<br>');
    }

    // 🌟 修复：完美的横向切割与上下对抗沙盘
    function drawMap(cid, d) {
        const c = document.getElementById(cid); if(!c) return;
        const ctx = c.getContext('2d');
        const w = c.width, h = c.height, b = state.bounds;
        
        ctx.fillStyle = "#0c0c10"; ctx.fillRect(0,0,w,h);
        
        // 画中场横线
        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)"; 
        ctx.lineWidth = 2;
        ctx.setLineDash([8,8]); 
        ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
        ctx.setLineDash([]);
        
        const boundX = b.maxX, boundY = b.maxY;

        const drawU = (u, color) => {
            // (0,0) 为绝对中心点。由于游戏内 Y>0 为敌方(顶端)，故将 Y 轴翻转。
            const px = w/2 + (u.x / boundX) * (w/2);
            const py = h/2 - (u.y / boundY) * (h/2);
            
            ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2); 
            ctx.fillStyle = color; ctx.fill();
            
            if(u.rot) { 
                ctx.strokeStyle="#fff"; ctx.lineWidth=1.5; 
                ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI*2); ctx.stroke();
            }
            
            ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; 
            ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillText(dict[u.id]?.s || "?", px, py+1);
        };

        // 上方队伍(敌) = 红色，下方队伍(己) = 蓝色
        d.uTop.forEach(u => drawU(u, "#ff3d00"));
        d.uBot.forEach(u => drawU(u, "#2979ff")); 
    }

    function exportImg() {
        const btn = document.querySelector('.btn-main');
        const old = btn.innerText; btn.innerText = "⌛ 生成长图中...";
        html2canvas(document.getElementById('render-area'), { backgroundColor: '#16161d', scale: 2 }).then(canvas => {
            const a = document.createElement('a');
            const mStr = state.mode === 'list' ? '全局复盘' : `R${state.rounds[state.cur].r}`;
            a.download = `钢铁指挥官_复盘_${mStr}_${new Date().getTime()}.png`;
            a.href = canvas.toDataURL(); a.click();
            btn.innerText = old;
        });
    }
</script>
</body>
</html>
